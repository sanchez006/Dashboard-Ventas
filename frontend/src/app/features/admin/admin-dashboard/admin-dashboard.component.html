<div class="dashboard-container">
  <h1>Desempeño de Vendedores</h1>
  <div *ngIf="cargando">
    <mat-spinner></mat-spinner>
    <p>Cargando datos...</p>
  </div>
  <div *ngIf="!cargando">
    <div class="vendedores-grid">
      <mat-card *ngFor="let vendedor of vendedores" class="vendedor-card">
        <div class="card-header">
          <h2>{{ vendedor.nombre }}</h2>
          <span class="badge">{{ vendedor.porcentajeGlobal }}%</span>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-label">Clientes</span>
            <span class="stat-value">{{ vendedor.total_clientes_mes }}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Facturación</span>
            <span class="stat-value">{{ formatearMoneda(vendedor.facturacion_total) }}</span>
          </div>
        </div>
        <div class="actions-row" style="margin-top: 12px; text-align: right;">
          <button mat-stroked-button color="primary" (click)="abrirDetalleVendedor(vendedor); $event.stopPropagation();" 
            style="background: yellow !important; color: red !important; font-size: 18px; border: 2px solid red;">
            ¡VER DETALLE PRUEBA!
          </button>
        </div>
      </mat-card>
    </div>
  </div>
</div>
